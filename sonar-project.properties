sonar.projectKey=stefan-asemota_retro-lite
sonar.organization=stefan-asemota

# Path to the LCOV report generated by Vitest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude tests and dependencies from analysis
sonar.exclusions=tests/**, node_modules/**

# Source configuration
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
